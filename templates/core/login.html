{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f4c81">
    <title>Clube de Aventureiros Pinhal Júnior</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <main class="tela-login">
        <section class="card-login" aria-label="Formulário de acesso">
            <div class="card-topo">
                <div class="logo-caixa">
                    <img
                        src="{% static 'img/logo.png' %}"
                        alt="Logo do Clube de Aventureiros Pinhal Júnior"
                        class="logo"
                        onerror="this.style.display='none'; this.parentNode.classList.add('sem-logo');"
                    >
                    <span class="logo-placeholder" aria-hidden="true">CA</span>
                </div>
                <h1 class="titulo">Clube de Aventureiros Pinhal Júnior</h1>
                <p class="subtitulo">Acesse sua conta para continuar</p>
            </div>

            {% if erro %}
            <div class="aviso-login" role="alert">{{ erro }}</div>
            {% endif %}

            <form class="form-login" method="post" action="{% url 'core:login' %}" novalidate>
                {% csrf_token %}
                {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

                <div class="campo">
                    <label for="usuario">Usuário</label>
                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        autocomplete="username"
                        placeholder="Digite seu usuário"
                        inputmode="text"
                        value="{{ usuario_digitado }}"
                        required
                    >
                </div>

                <div class="campo">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        name="senha"
                        autocomplete="current-password"
                        placeholder="Digite sua senha"
                        required
                    >
                </div>

                <button type="submit" class="botao-entrar">Entrar</button>

                <a href="{% url 'core:cadastro' %}" class="link-cadastro">Cadastre-se</a>

                <a href="{% url 'core:recuperar_senha' %}" class="link-esqueci">Esqueci minha senha</a>
            </form>
        </section>

        <footer class="rodape">
            © {% now "Y" %} Clube de Aventureiros Pinhal Júnior
        </footer>
    </main>
</body>
</html>
